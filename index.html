<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・モバイルページ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 基本スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
        }

        /* ヘッダー */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* メインコンテンツ */
        main {
            padding: 20px;
            max-width: 600px; /* スマホ向けに横幅を制限 */
            margin: 0 auto;
        }

        /* カード型デザイン */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; }
        h2 { color: #2c3e50; border-left: 5px solid #2c3e50; padding-left: 10px; }

        /* 画像を画面内に収める設定 */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* ボタン */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
            box-sizing: border-box;
        }

        /* フッター */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Mobile Site</h1>
    </header>

    <main>
        <div class="card">
            <h2>ようこそ！</h2>
            <p>これはGitHub Pagesで公開するためのスマホ最適化テンプレートです。</p>
            <img src="https://via.placeholder.com/600x300" alt="サンプル画像">
        </div>

        <div class="card">
            <h2>自己紹介</h2>
            <p>ここにあなたのプロフィールや、プロジェクトの説明を書いてください。</p>
            <a href="#" class="btn">詳細を見る</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>

</body>
</html>
